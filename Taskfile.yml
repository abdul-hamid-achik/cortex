version: "3"

vars:
  BINARY_NAME: cortex
  BUILD_DIR: ./bin
  MODULE: github.com/abdul-hamid-achik/cortex
  MAIN: ./cmd/cortex
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo dev
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo none
  BUILD_TIME:
    sh: date -u +%Y-%m-%dT%H:%M:%SZ
  LDFLAGS: >-
    -s -w
    -X {{.MODULE}}/internal/version.Version={{.VERSION}}
    -X {{.MODULE}}/internal/version.Commit={{.COMMIT}}
    -X {{.MODULE}}/internal/version.Date={{.BUILD_TIME}}

env:
  CGO_ENABLED: "0"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  doctor:
    desc: Check the development environment and the sibling tool ecosystem
    silent: true
    cmds:
      - 'echo "go:         $(go version 2>/dev/null || echo MISSING)"'
      - 'echo "task:       $(task --version 2>/dev/null || echo MISSING)"'
      - 'echo "golangci:   $(golangci-lint version 2>/dev/null | head -1 || echo missing)"'
      - 'echo "glyph:      $(glyph --version 2>/dev/null || echo missing)"'
      - 'echo "bun:        $(bun --version 2>/dev/null || echo missing)"'
      - 'echo "--- sibling tools (adapters degrade gracefully when missing) ---"'
      - 'for t in bob codemap vecgrep cairn glyph fcheap tvault mcphub; do printf "%-10s %s\n" "$t" "$(command -v $t 2>/dev/null || echo missing)"; done'

  setup:
    desc: Download and tidy Go modules
    cmds:
      - go mod download
      - go mod tidy

  fmt:
    desc: Format Go code
    aliases: [format]
    cmds:
      - gofmt -s -w .

  lint:
    desc: Lint with golangci-lint v2 (matches CI); falls back to vet+gofmt offline
    cmds:
      - |
        LINT=""
        if golangci-lint version 2>/dev/null | grep -qE 'version v?2\.'; then
          LINT="golangci-lint"
        elif GOBIN="$PWD/bin" go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2 2>/dev/null; then
          LINT="$PWD/bin/golangci-lint"
        fi
        if [ -n "$LINT" ]; then
          "$LINT" run ./...
        else
          echo "note: golangci-lint v2 unavailable (offline?); running go vet + gofmt"
          go vet ./...
          test -z "$(gofmt -l .)" || (echo "unformatted files:"; gofmt -l .; exit 1)
        fi

  test:
    desc: Run unit tests
    cmds:
      - go test ./...

  race:
    desc: Run tests with the race detector
    env:
      CGO_ENABLED: "1"
    cmds:
      - go test -race ./...

  cov:
    desc: Run tests with coverage
    aliases: [coverage]
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -func=coverage.out | tail -1

  check:
    desc: Format, lint, and test (pre-commit gate)
    aliases: [ci, verify]
    cmds:
      - task: fmt
      - task: lint
      - task: test

  build:
    desc: Build the cortex binary to ./bin
    cmds:
      - go build -ldflags "{{.LDFLAGS}}" -o {{.BUILD_DIR}}/{{.BINARY_NAME}} {{.MAIN}}

  release:
    desc: Build an optimized, trimmed binary
    cmds:
      - go build -trimpath -ldflags "{{.LDFLAGS}}" -o {{.BUILD_DIR}}/{{.BINARY_NAME}} {{.MAIN}}

  install:
    desc: go install cortex to GOPATH/bin
    cmds:
      - go install -ldflags "{{.LDFLAGS}}" {{.MAIN}}

  run:
    desc: Build and run (pass args via CLI_ARGS="...")
    cmds:
      - task: build
      - "{{.BUILD_DIR}}/{{.BINARY_NAME}} {{.CLI_ARGS}}"

  flows:
    desc: Run glyphrun E2E behavior specs (local only — not run in CI)
    aliases: [e2e]
    deps: [build]
    cmds:
      - glyph run specs/*.yml --format md --progress auto

  eval:
    desc: Run the evaluation harness (outcome + evidence-trail scorecard)
    cmds:
      - go test ./internal/eval/... -run TestEvalHarness -v

  trajectory-validate:
    desc: Validate an empirical trajectory manifest without executing it
    requires:
      vars: [MANIFEST]
    cmds:
      - go run ./cmd/cortex-trajectory validate --manifest "{{.MANIFEST}}"

  trajectory:
    desc: Run an explicitly approved empirical trajectory outside ordinary CI
    requires:
      vars: [MANIFEST, LAUNCHER]
    cmds:
      - go run ./cmd/cortex-trajectory run --manifest "{{.MANIFEST}}" --launcher "{{.LAUNCHER}}"

  docsdeps:
    desc: Install docs (VitePress) dependencies with Bun
    cmds:
      - bun install --cwd docs --frozen-lockfile

  docs:
    desc: Run the VitePress docs dev server
    cmds:
      - bun run --cwd docs dev

  docsbuild:
    desc: Build the VitePress docs site
    cmds:
      - bun run --cwd docs build

  docstest:
    desc: Test the documentation configuration
    cmds:
      - bun run --cwd docs test

  ship:
    desc: Full pre-release gate (check + race + build + flows + docs tests/build)
    cmds:
      - task: check
      - task: race
      - task: build
      - task: flows
      - task: docstest
      - task: docsbuild

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.BUILD_DIR}} dist coverage.out coverage.html
