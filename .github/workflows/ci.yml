name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  TASK_VERSION: v3.51.1

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Set up Task
        run: go install github.com/go-task/task/v3/cmd/task@${TASK_VERSION}

      # The specialist tools (codemap, vecgrep, cairn, glyph, fcheap, tvault) are
      # NOT installed in CI: every adapter degrades safely when its binary is
      # absent, and tests that need a real sibling skip themselves. glyphrun E2E
      # specs (task flows) are local-only, by design.
      - name: Test
        run: task test

      - name: Race
        run: task race

      - name: Build
        run: task build

      - name: Coverage
        run: go test -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v7
        with:
          files: coverage.out
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
