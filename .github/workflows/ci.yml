name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  TASK_VERSION: v3.51.1

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25'
          cache: true

      - name: Set up Task
        run: go install github.com/go-task/task/v3/cmd/task@${TASK_VERSION}

      # The specialist tools (codemap, vecgrep, cairn, glyph, fcheap, tvault) are
      # NOT installed in CI: every adapter degrades safely when its binary is
      # absent, and tests that need a real sibling skip themselves. glyphrun E2E
      # specs (task flows) are local-only, by design.
      - name: Test
        run: task test

      - name: Race
        run: task race

      - name: Build
        run: task build

      - name: Coverage
        run: go test -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage.out
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: latest

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.14'

      - name: Install documentation dependencies
        run: bun install --cwd docs --frozen-lockfile

      - name: Test documentation configuration
        run: bun run --cwd docs test

      - name: Build documentation site
        run: bun run --cwd docs build

      - name: Check release navigation
        run: |
          grep -Fq 'VPNavBarMenuLink" href="https://github.com/abdul-hamid-achik/cortex/releases/latest"' docs/.vitepress/dist/index.html
          grep -Fq '>Latest release</span>' docs/.vitepress/dist/index.html
