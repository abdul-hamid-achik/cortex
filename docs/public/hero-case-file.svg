<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 520" role="img" aria-labelledby="title desc">
  <title id="title">A Cortex case file with revision-bound proof</title>
  <desc id="desc">An illustrative case file connects the six-step reasoning loop to a falsifiable hypothesis, bounded change lease, and verification receipt for the current workspace revision.</desc>
  <defs>
    <linearGradient id="shell" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#262622"/>
      <stop offset="1" stop-color="#151514"/>
    </linearGradient>
    <linearGradient id="receipt" x1="0" x2="1">
      <stop offset="0" stop-color="#1d2119"/>
      <stop offset="1" stop-color="#171915"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity=".24"/>
    </filter>
  </defs>

  <rect x="20" y="18" width="580" height="484" rx="42" fill="url(#shell)" stroke="#403f39" filter="url(#shadow)"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
    <g transform="translate(48 47)">
      <circle cx="13" cy="13" r="12" fill="#10100f" stroke="#5a574f"/>
      <path d="M12 7a7 7 0 1 0 0 12" fill="none" stroke="#faf9f5" stroke-width="2.8" stroke-linecap="round"/>
      <circle cx="12" cy="7" r="1.7" fill="#d97757"/>
      <circle cx="12" cy="19" r="1.7" fill="#788c5d"/>
      <text x="36" y="10" fill="#8e8b82" font-size="8" font-weight="700" letter-spacing="1.2">CORTEX CASE FILE</text>
      <text x="36" y="25" fill="#f2f0e9" font-size="13" font-weight="700">task_06FK…</text>
    </g>

    <g transform="translate(430 51)">
      <rect width="82" height="26" rx="13" fill="#352219" stroke="#70402f"/>
      <circle cx="14" cy="13" r="3" fill="#d97757"/>
      <text x="24" y="16" fill="#e8a088" font-size="8" font-weight="700" letter-spacing=".8">VERIFYING</text>
      <text x="94" y="16" fill="#8f8c83" font-size="9">rev 17</text>
    </g>

    <line x1="48" y1="91" x2="572" y2="91" stroke="#403f39"/>

    <rect x="44" y="111" width="160" height="357" rx="22" fill="#1b1b19" stroke="#36352f"/>
    <text x="64" y="139" fill="#858278" font-size="8" font-weight="700" letter-spacing="1.1">REASONING LOOP</text>
    <line x1="77" y1="166" x2="77" y2="428" stroke="#47453f"/>

    <g font-size="9">
      <g transform="translate(63 164)">
        <circle cx="14" cy="14" r="14" fill="#20261a" stroke="#607048"/>
        <path d="m8 14 4 4 8-9" fill="none" stroke="#a6b88a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="38" y="11" fill="#ece9e1" font-weight="700">open</text>
        <text x="38" y="24" fill="#79766e">baseline</text>
      </g>
      <g transform="translate(63 215)">
        <circle cx="14" cy="14" r="14" fill="#20261a" stroke="#607048"/>
        <path d="m8 14 4 4 8-9" fill="none" stroke="#a6b88a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="38" y="11" fill="#ece9e1" font-weight="700">investigate</text>
        <text x="38" y="24" fill="#79766e">evidence</text>
      </g>
      <g transform="translate(63 266)">
        <circle cx="14" cy="14" r="14" fill="#20261a" stroke="#607048"/>
        <path d="m8 14 4 4 8-9" fill="none" stroke="#a6b88a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="38" y="11" fill="#ece9e1" font-weight="700">plan</text>
        <text x="38" y="24" fill="#79766e">disproof</text>
      </g>
      <g transform="translate(63 317)">
        <circle cx="14" cy="14" r="14" fill="#20261a" stroke="#607048"/>
        <path d="m8 14 4 4 8-9" fill="none" stroke="#a6b88a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="38" y="11" fill="#ece9e1" font-weight="700">change</text>
        <text x="38" y="24" fill="#79766e">lease</text>
      </g>
      <g transform="translate(63 368)">
        <circle cx="14" cy="14" r="14" fill="#d97757" stroke="#ec997c"/>
        <circle cx="14" cy="14" r="4" fill="#171716"/>
        <text x="38" y="11" fill="#faf9f5" font-weight="700">verify</text>
        <text x="38" y="24" fill="#bf8a76">current revision</text>
      </g>
      <g transform="translate(63 419)">
        <circle cx="14" cy="14" r="14" fill="#1b1b19" stroke="#4b4943"/>
        <text x="38" y="11" fill="#a19e96" font-weight="700">remember</text>
        <text x="38" y="24" fill="#69675f">outcome</text>
      </g>
    </g>

    <g transform="translate(220 111)">
      <rect width="352" height="107" rx="18" fill="#1d1d1a" stroke="#3d3b35"/>
      <text x="18" y="23" fill="#d98568" font-size="8" font-weight="700" letter-spacing="1">HYPOTHESIS</text>
      <rect x="272" y="12" width="62" height="22" rx="11" fill="#24231f" stroke="#48463f"/>
      <text x="285" y="26" fill="#aaa79e" font-size="8">medium</text>
      <text x="18" y="51" fill="#f2f0e9" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650">returnTo is dropped before callback</text>
      <line x1="18" y1="66" x2="334" y2="66" stroke="#36352f"/>
      <text x="18" y="86" fill="#77746c" font-size="8" font-weight="700">DISPROVE</text>
      <text x="86" y="86" fill="#b8b5ac" font-size="9">run checkout return flow</text>
    </g>

    <g transform="translate(220 231)">
      <rect width="352" height="92" rx="18" fill="#1d1d1a" stroke="#3d3b35"/>
      <text x="18" y="23" fill="#d98568" font-size="8" font-weight="700" letter-spacing="1">BOUNDARY</text>
      <text x="18" y="48" fill="#ece9e1" font-size="10">src/auth/callback.go</text>
      <text x="18" y="67" fill="#858278" font-size="9">HandleCallback</text>
      <rect x="221" y="38" width="113" height="32" rx="10" fill="#171716" stroke="#45433d"/>
      <circle cx="237" cy="54" r="4" fill="#d97757"/>
      <text x="248" y="52" fill="#b8b5ac" font-size="8">agent-auth</text>
      <text x="248" y="64" fill="#706e67" font-size="7">lease · 12m</text>
    </g>

    <g transform="translate(220 336)">
      <rect width="352" height="132" rx="18" fill="url(#receipt)" stroke="#46513a"/>
      <text x="18" y="23" fill="#a7ba88" font-size="8" font-weight="700" letter-spacing="1">VERIFICATION RECEIPT</text>
      <text x="18" y="47" fill="#f2f0e9" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="650">checkout redirect preserves returnTo</text>
      <text x="18" y="69" fill="#858278" font-size="8">cairntrace</text>
      <text x="89" y="69" fill="#b8b5ac" font-size="8">checkout_return.yml</text>
      <line x1="18" y1="84" x2="334" y2="84" stroke="#3a4133"/>
      <circle cx="24" cy="105" r="6" fill="#788c5d"/>
      <path d="m21 105 2 2 4-5" fill="none" stroke="#f5f4ef" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="38" y="108" fill="#b7ca98" font-size="9" font-weight="700">VERIFIED</text>
      <text x="187" y="108" fill="#8c8a82" font-size="8">HEAD e532869 · diff bound</text>
    </g>
  </g>
</svg>
