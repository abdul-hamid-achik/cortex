<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 520" role="img" aria-labelledby="title desc">
  <title id="title">The Cortex reasoning loop</title>
  <desc id="desc">A bounded orbital diagram connecting orientation, evidence, planning, change, verification, and memory.</desc>
  <defs>
    <linearGradient id="surface" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#252521"/>
      <stop offset="1" stop-color="#171716"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>
  <rect x="28" y="28" width="564" height="464" rx="56" fill="url(#surface)" stroke="#3a3934"/>
  <circle cx="310" cy="260" r="168" fill="none" stroke="#4a4841" stroke-width="1.5" stroke-dasharray="4 10"/>
  <circle cx="310" cy="260" r="112" fill="none" stroke="#34332e" stroke-width="28" opacity=".65"/>
  <circle cx="310" cy="260" r="65" fill="#111110" stroke="#5a574f" stroke-width="1.5"/>
  <path d="M291 231a36 36 0 1 0 0 58" fill="none" stroke="#faf9f5" stroke-width="9" stroke-linecap="round"/>
  <circle cx="292" cy="231" r="6" fill="#d97757"/>
  <circle cx="292" cy="289" r="6" fill="#788c5d"/>
  <circle cx="310" cy="260" r="4" fill="#faf9f5"/>
  <g font-family="Outfit, system-ui, sans-serif" font-size="15" font-weight="600" fill="#e8e6dc">
    <g transform="translate(310 80)"><circle r="22" fill="#d97757"/><text text-anchor="middle" y="42">orient</text></g>
    <g transform="translate(466 170)"><circle r="22" fill="#2d2c28" stroke="#6d6a61"/><text text-anchor="middle" y="42">evidence</text></g>
    <g transform="translate(466 350)"><circle r="22" fill="#2d2c28" stroke="#6d6a61"/><text text-anchor="middle" y="42">plan</text></g>
    <g transform="translate(310 440)"><circle r="22" fill="#788c5d"/><text text-anchor="middle" y="42">change</text></g>
    <g transform="translate(154 350)"><circle r="22" fill="#2d2c28" stroke="#6d6a61"/><text text-anchor="middle" y="42">verify</text></g>
    <g transform="translate(154 170)"><circle r="22" fill="#2d2c28" stroke="#6d6a61"/><text text-anchor="middle" y="42">remember</text></g>
  </g>
  <circle cx="310" cy="80" r="38" fill="#d97757" opacity=".12" filter="url(#soft)"/>
  <circle cx="310" cy="440" r="38" fill="#788c5d" opacity=".12" filter="url(#soft)"/>
</svg>
